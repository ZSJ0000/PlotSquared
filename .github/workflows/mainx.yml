name: Build and Download Plotsquared

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 验证Gradle Wrapper
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      # 3. 设置Java环境（Plotsquared需Java 21）
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 4. 清理并构建所有模块（含打包任务）
      - name: Clean Build All Modules
        run: ./gradlew clean build assemble -x test  # -x test跳过测试，加速构建

      # 5. 下载所有模块的构建产物（自动归档到当前目录）
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: .  # 下载所有模块的产物到当前目录
          merge-multiple: true  # 合并所有模块的产物到同一目录

      # 6. 上传构建产物（保留7天）
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plotsquared-build
          path: .  # 上传当前目录下的所有产物
          retention-days: 7
